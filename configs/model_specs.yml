  regressors:
    - expected_soma_redemptions_dv01
    - low_liquidity_prev
    - expected_soma_redemptions_x_low_liquidity
    - privately_held_net_marketable_borrowing_bn
    - debt_limit_flag
    - buyback_offset_dv01
  robust_cov: HC3
  # cash_balance_assumption_bn removed — currently constant placeholder (750),
  # collinear with intercept. Restore once per-quarter values available.

local_projections:
  horizons: [0, 1, 2, 3, 4, 5, 6, 7, 8]
  dealer_outcome: dealer_inventory_bn
  repo_outcome: repo_spread_bp
  shock: fed_pressure_dv01
  interaction: fed_pressure_x_low_liquidity
  controls:
    - dealer_inventory_lag1
    - repo_spread_lag1
    - tga_change_bn
    - quarter_end_flag
  cov_type: HAC
  hac_lags: 4
