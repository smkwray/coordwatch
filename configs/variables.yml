fred_core_series:
  WSHOTSL: soma_treasuries_weekly_level
  WRESBAL: reserves_weekly_level
  WTREGEN: tga_weekly_level
  RRPONTSYD: on_rrp_daily_amount
  RRPONTSYAWARD: on_rrp_award_rate
  TGCR: tri_party_general_collateral_rate  # FRED series is TGCRRATE; saved as TGCR.csv
  IORB: interest_on_reserve_balances
  DGS2: treasury_constant_maturity_2y
  DGS5: treasury_constant_maturity_5y
  DGS10: treasury_constant_maturity_10y
  DGS20: treasury_constant_maturity_20y
  DGS30: treasury_constant_maturity_30y

quarter_variables:
  privately_held_net_marketable_borrowing_bn: Treasury financing need control
  cash_balance_assumption_bn: TGA target assumed in Treasury statement
  expected_soma_redemptions_dv01: duration-equivalent Fed runoff pressure at refunding frequency
  coupon_dv01_shock: duration-equivalent effect of coupon-size changes versus carry-forward baseline
  bill_dv01_offset: short-maturity offset proxy
  buyback_offset_dv01: duration-equivalent burden removed by Treasury buybacks
  mix_shock_dv01: headline Treasury composition shock

weekly_variables:
  qt_runoff_dv01: weekly holdings-based duration-equivalent private burden from Fed Treasury runoff
  coupon_dv01_shock: current-quarter coupon duration-equivalent shock carried into weekly panel
  bill_dv01_offset: current-quarter bill offset carried into weekly panel
  duration_pressure_dv01: qt_runoff_dv01 plus coupon_dv01_shock minus buyback offset
  system_liquidity_bn: reserves plus ON RRP
  dealer_inventory_bn: primary dealer net Treasury position
  repo_spread_bp: TGCR minus ON RRP award rate
  repo_spread_iorb_bp: TGCR minus IORB
  fed_pressure_dv01: duration_pressure_dv01 minus current-quarter bill offset
